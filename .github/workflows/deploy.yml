name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/spj-bphl4.dniel.my.id/spj-bphl
            # Paksa hapus semua perubahan lokal/divergent di VPS dan samakan 100% dengan branch main di GitHub
            git fetch origin
            git reset --hard origin/main

            # Restart podman containers dengan build ulang
            podman-compose -f docker-compose.prod.yml up -d --build

            # Tunggu beberapa detik agar container siap
            sleep 5

            # Eksekusi migrasi database (Wajib karena ada kolom baru destinasi)
            podman exec spj-bphl-app-prod php artisan migrate --force

            # Bersihkan dan segarkan cache Laravel (config, routes, views)
            podman exec spj-bphl-app-prod php artisan optimize:clear
            podman exec spj-bphl-app-prod php artisan optimize
