version: '3.8'

services:
  app:
    build:
      context: .
      target: development
    container_name: spj-bphl-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - spj-network

  web:
    image: nginx:alpine
    container_name: spj-bphl-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - spj-network

networks:
  spj-network:
    driver: bridge
